<h2>Gandhi Hall</h2>

<p>
Gandhi Hall is a historical building constructed during the British
period and was earlier known as King Edward Hall.
</p>

<p>
It is now used for cultural programs, exhibitions, and public events.
The building stands as a reminder of colonial-era architecture in Indore.
</p>
