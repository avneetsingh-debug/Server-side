<h2>Bada Ganpati</h2>

<p>
Bada Ganpati is a famous religious site in Indore known for housing one
of the largest idols of Lord Ganesha in the world.
</p>

<p>
The temple is a major pilgrimage center and attracts thousands of
devotees and tourists every year.
</p>
