<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Document</title>
</head>
<body>
    <h1>Employee Registration Form</h1>
  </div>

  <form>
    <table>
      <tr>
        <td></td>
        <td>
          <label><input type="radio" name="title" value="mr" checked /> Mr.</label>
          <label><input type="radio" name="title" value="mrs" /> Mrs.</label>
          <label><input type="radio" name="title" value="ms" /> Ms.</label>
        </td>
      </tr>
      <tr>
        <td>First Name</td>
        <td><input type="text" name="first_name" placeholder="First Name" /></td>
      </tr>
      <tr>
        <td>Last Name</td>
        <td><input type="text" name="last_name" placeholder="Last Name" /></td>
      </tr>
      <tr>
        <td>Mail Address1</td>
        <td><input type="text" name="mail1" /></td>
      </tr>
      <tr>
        <td>Mail Address2</td>
        <td><input type="text" name="mail2" /></td>
      </tr>
      <tr>
        <td>City</td>
        <td><input type="text" name="city" /></td>
      </tr>
      <tr>
        <td>State</td>
        <td>
          <select name="state">
            <option>Gujarat</option>
            <option>Maharashtra</option>
            <option>Rajasthan</option>
            <option>Delhi</option>
            <option>Other</option>
          </select>
        </td>
      </tr>
      <tr>
        <td>Zip</td>
        <td><input type="text" name="zip" /></td>
      </tr>
      <tr>
        <td>Upload Photo</td>
        <td><input type="file" name="photo" /></td>
      </tr>
      <tr>
        <td>E-Mail</td>
        <td><input type="email" name="email" /></td>
      </tr>
      <tr>
        <td>Mobile</td>
        <td><input type="tel" name="mobile" placeholder="+91" /></td>
      </tr>
      <tr>
        <td>Languages known</td>
        <td>
          <label><input type="checkbox" name="lang" value="gujarati" checked /> Gujarati</label><br />
          <label><input type="checkbox" name="lang" value="hindi" checked /> Hindi</label><br />
          <label><input type="checkbox" name="lang" value="english" checked /> English</label><br />
          <label><input type="checkbox" name="lang" value="marathi" /> Marathi</label>
        </td>
      </tr>
      <tr>
        <td>Additional Information</td>
        <td><textarea name="additional" placeholder="Optional"></textarea></td>
      </tr>
      <tr>
        <td></td>
        <td>
          <input type="submit" value="submit" />
          <input type="reset" value="reset" />
        </td>
      </tr>
    </table>
  </form>
</body>
</html>
